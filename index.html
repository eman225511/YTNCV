<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>YTNCV</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  background: #0b0b0b;
  color: white;
  font-family: -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 10px;
}

/* Top bar */
#bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 15px;
}

#bar input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1a1a1a;
  color: white;
}

#bar button, #bar a {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  height: 44px; /* match input height */
  border-radius: 10px;
  background: #2a2a2a;
  color: white;
  font-size: 16px;
  text-decoration: none;
  cursor: pointer;
}

#bar a svg {
  width: 20px;
  height: 20px;
  fill: white;
}

/* Embed container */
#embed-container {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto 15px auto;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #111;
}

/* Dynamic height based on width for 16:9 ratio */
#embed-container iframe {
  width: 100%;
  height: calc(100vw * 9 / 16); /* default for mobile */
  max-height: 600px; /* desktop max */
  border: none;
}

@media (min-width: 768px) {
  #embed-container iframe {
    height: calc(80vw * 9 / 16);
  }
}

@media (min-width: 1200px) {
  #embed-container iframe {
    height: 540px; /* desktop fixed max */
  }
}

/* Info panel */
#info {
  padding: 10px;
  font-size: 14px;
  color: #aaa;
  line-height: 1.5;
}

code {
  background: #222;
  padding: 3px 6px;
  border-radius: 6px;
}
</style>
</head>
<body onload="init()">

<div id="bar">
  <a href="./" title="Home">
    <svg viewBox="0 0 24 24">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
  </a>
  <input id="input" placeholder="Paste YouTube link or playlist">
  <button onclick="load()">▶</button>
</div>

<div id="embed-container"></div>

<div id="info">
  <b>How to use:</b><br>
  Paste any YouTube video, Shorts, or playlist link.<br><br>
  
  Works with:<br>
  • <code>youtube.com</code><br>
  • <code>youtu.be</code><br>
  • playlists (<code>?list=</code>)<br><br>
  
  You can also open directly with:<br>
  <code>?yt=YOUR_LINK</code>
</div>

<script>
const input = document.getElementById("input");
const embedContainer = document.getElementById("embed-container");

function getID(url) {
  try {
    const u = new URL(url);
    if (u.searchParams.get("v")) return u.searchParams.get("v");
    if (u.pathname.includes("/shorts/"))
      return u.pathname.split("/shorts/")[1].split("/")[0];
    if (u.hostname.includes("youtu.be"))
      return u.pathname.slice(1);
  } catch {}
  return url;
}

function getList(url) {
  try {
    const u = new URL(url);
    return u.searchParams.get("list");
  } catch {
    return null;
  }
}

function load(fromParam=false) {
  let url = fromParam 
    ? new URLSearchParams(location.search).get("yt")
    : input.value.trim();

  if (!url) return;

  const list = getList(url);
  let embed;

  if (list) {
    embed = `https://www.youtube-nocookie.com/embed/videoseries?list=${list}&autoplay=1`;
  } else {
    const id = getID(url);
    embed = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&playsinline=1`;
  }

  embedContainer.innerHTML = `
    <iframe
      src="${embed}"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
    ></iframe>
  `;

  history.replaceState(null, "", "?yt=" + encodeURIComponent(url));
}

function init() {
  const params = new URLSearchParams(location.search);
  if (params.get("yt")) load(true);
}

input.addEventListener("keypress", e => {
  if (e.key === "Enter") load();
});
</script>

</body>
</html>
