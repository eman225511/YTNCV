<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>YTNCV</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Top bar */
#bar {
  padding: 10px;
  background: #111;
  display: flex;
  gap: 8px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: #1a1a1a;
  color: white;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #2a2a2a;
  color: white;
  font-size: 16px;
}

/* Player */
#player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

#player {
  flex: 1;
  display: none;
}

/* Info panel */
#info {
  padding: 15px;
  font-size: 14px;
  color: #aaa;
  line-height: 1.5;
}

code {
  background: #222;
  padding: 3px 6px;
  border-radius: 6px;
}
</style>
</head>

<body onload="init()">

<div id="bar">
  <input id="input" placeholder="Paste YouTube link or playlist">
  <button onclick="load()">▶</button>
</div>

<div id="player"></div>

<div id="info">
  <b>How to use:</b><br>
  Paste any YouTube video, Shorts, or playlist link.<br><br>
  
  Works with:<br>
  • <code>youtube.com</code><br>
  • <code>youtu.be</code><br>
  • playlists (<code>?list=</code>)<br><br>
  
  You can also open directly with:<br>
  <code>?yt=YOUR_LINK</code>
</div>

<script>
const input = document.getElementById("input");
const player = document.getElementById("player");

// Extract video ID
function getID(url) {
  try {
    const u = new URL(url);

    if (u.searchParams.get("v")) return u.searchParams.get("v");

    if (u.pathname.includes("/shorts/"))
      return u.pathname.split("/shorts/")[1].split("/")[0];

    if (u.hostname.includes("youtu.be"))
      return u.pathname.slice(1);

  } catch {}

  return url;
}

// Extract playlist ID
function getList(url) {
  try {
    const u = new URL(url);
    return u.searchParams.get("list");
  } catch {
    return null;
  }
}

// Load video OR playlist
function load(fromParam=false) {
  let url = fromParam 
    ? new URLSearchParams(location.search).get("yt")
    : input.value.trim();

  if (!url) return;

  const list = getList(url);

  let embed;

  if (list) {
    // 🔥 playlist support
    embed = `https://www.youtube-nocookie.com/embed/videoseries?list=${list}&autoplay=1`;
  } else {
    const id = getID(url);
    embed = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&playsinline=1`;
  }

  player.innerHTML = `
    <iframe
      src="${embed}"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
    ></iframe>
  `;

  player.style.display = "block";
  document.getElementById("info").style.display = "none";

  history.replaceState(null, "", "?yt=" + encodeURIComponent(url));
}

// Init on load
function init() {
  const params = new URLSearchParams(location.search);
  if (params.get("yt")) load(true);
}

// Enter key
input.addEventListener("keypress", e => {
  if (e.key === "Enter") load();
});
</script>

</body>
</html>
